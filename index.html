<!doctype html>
<html lang="de">
  <head>

    <title>Meine erste Webseite</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="container">
      <h1>Hallo Web!</h1>
      <p>Das ist meine erste Webseite im Internet.</p>
      <button id="themeBtn" type="button">Dark Mode umschalten</button>

    <main class="container">
      <section class="card">
        <h2>Was ist das hier?</h2>
        <p>
          Diese Seite besteht aus HTML (Struktur), CSS (Design) und JavaScript

        </p>

      <section class="card">
        <h2>Mini-Liste</h2>
        <ul>
          <li>HTML: Überschriften, Absätze, Listen</li>
          <li>CSS: Farben, Abstände, Layout</li>
          <li>JS: Klick-Button, Dark Mode</li>
        </ul>
      </section>
    </main>

    <footer class="container footer">
      <small>© <span id="year"></span> Ich</small>
    </footer>

    <script src="script.js"></script>
